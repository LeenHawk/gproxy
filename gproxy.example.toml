# Example configuration for gproxy.

[app]
# Bind address for the main proxy runtime.
host = "127.0.0.1"
port = 8787

# admin_key protects /admin endpoints. Generate a strong key for production.
admin_key = "change-me"
# api_key reserved for future non-admin endpoints.
api_keys = ["change-me"]

# Optional global proxy for all upstream requests.
# Examples: "http://127.0.0.1:7890", "socks5://127.0.0.1:1080"
# proxy = ""

[storage]
mode = "file" # "file" or "database" or "memory" or "s3"

[storage.file]
path = "./gproxy.toml"
# Optional directory to store usage.jsonl / usage_view.jsonl (default: "./data").
# data_dir = "./data"
# Optional debounce for file writes in seconds (default 0).
# debounce_secs = 0

# Database example:
# [storage.database]
# uri = "postgres://user:pass@localhost:5432/gproxy"
# # max_connections = 10
# # min_connections = 1
# # connect_timeout_secs = 10
# # schema = "public"
# # ssl_mode = "require"
# # debounce_secs = 0

# S3 example:
# [storage.s3]
# bucket = "my-bucket"
# region = "us-east-1"
# access_key = "AKIA..."
# secret_key = "..."
# # endpoint = "https://s3.amazonaws.com"
# # path_style = false
# # session_token = "..."
# # use_tls = true
# path = "gproxy.toml"
# # debounce_secs = 10


# ------------------------------------------------------------------------------
# Providers
# ------------------------------------------------------------------------------
#
# Each provider can be defined with [providers.<name>.setting] (shared) and
# [[providers.<name>.credentials]]. Env overrides like
# GPROXY_PROVIDERS__OPENAI__BASE_URL or GPROXY_PROVIDERS__OPENAI__KEY are
# normalized into the same structure.

# --- OpenAI ---
# [providers.openai.setting]
# base_url = "https://api.openai.com/v1"
# rotate_num = 1

[[providers.openai.credentials]]
key = "sk-xxxx"
state = "active"
# until = 0

